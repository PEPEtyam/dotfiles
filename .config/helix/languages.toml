# =============================================================================
# PYTHON CONFIGURATION
# =============================================================================
[[language]]
name = "python"
scope = "source.python"
injection-regex = "python"
file-types = ["py", "pyi", "py3", "pyw", ".pythonstartup", ".pythonrc", "pth", "pyw"]
shebangs = ["python", "python3", "python3.9", "python3.10", "python3.11", "python3.12", "uv"]
roots = ["pyproject.toml", "setup.py", "setup.cfg", "requirements.txt", "Pipfile", "pyrightconfig.json", ".git"]
comment-token = "#"
language-servers = ["ty", "ruff"]
indent = { tab-width = 4, unit = "    " }
auto-format = false
# rulers = [120]

[language.formatter]
command = "ruff"
args = ["format", "--stdin-filename", "{file_path}", "-"]

[language-server.ty]
command = "ty"
args = ["server"]

[language-server.ruff]
command = "ruff"
args = ["server", "--preview"]

[language-server.ruff.config]
lint.enable = true
fix.enable = true
organizeImports = true
format.enable = true

