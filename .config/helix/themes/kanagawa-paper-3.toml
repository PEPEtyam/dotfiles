# Kanagawa Paper theme for Helix Editor
# Based on kanagawa-paper color palette
# Save as ~/.config/helix/themes/kanagawa-paper.toml

# UI Colors
"ui.background" = { bg = "transparent" }
"ui.background.separator" = "sumiInk6"
"ui.cursor" = { fg = "oldWhite", bg = "waveRed" }
"ui.cursor.normal" = { fg = "sumiInk0", bg = "fujiWhite" }
"ui.cursor.insert" = { fg = "sumiInk0", bg = "springGreen" }
"ui.cursor.select" = { fg = "sumiInk0", bg = "lightBlue" }
"ui.cursor.match" = { fg = "sumiInk0", bg = "waveAqua2" }
"ui.cursor.primary" = { fg = "sumiInk0", bg = "springViolet1", modifiers = ["bold"] }
"ui.cursor.secondary" = { fg = "sumiInk0", bg = "oldWhite" }

"ui.cursorline.primary" = { bg = "sumiInk2" }
"ui.cursorline.secondary" = { bg = "sumiInk1" }

"ui.selection" = { bg = "waveBlue1" }
"ui.selection.primary" = { bg = "waveBlue2" }

"ui.linenr" = "sumiInk6"
"ui.linenr.selected" = { fg = "sakuraPink", modifiers = ["bold"] }

"ui.statusline" = { fg = "oldWhite", bg = "sumiInk4" }
"ui.statusline.inactive" = { fg = "sumiInk6", bg = "sumiInk3" }
"ui.statusline.normal" = { fg = "sumiInk0", bg = "crystalBlue", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "sumiInk0", bg = "springGreen", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "sumiInk0", bg = "oniViolet", modifiers = ["bold"] }
"ui.statusline.separator" = "sumiInk6"

"ui.bufferline" = { fg = "sumiInk6", bg = "sumiInk3" }
"ui.bufferline.active" = { fg = "fujiWhite", bg = "sumiInk4", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "sumiInk2" }

"ui.popup" = { fg = "fujiWhite", bg = "sumiInk3" }
"ui.popup.info" = { fg = "fujiWhite", bg = "sumiInk3" }
"ui.window" = "sumiInk6"
"ui.help" = { fg = "fujiWhite", bg = "sumiInk3" }

"ui.text" = "fujiWhite"
"ui.text.focus" = { fg = "fujiWhite", modifiers = ["bold"] }
"ui.text.inactive" = "sumiInk6"
"ui.text.info" = { fg = "springBlue", modifiers = ["bold"] }

"ui.virtual" = "sumiInk6"
"ui.virtual.ruler" = { bg = "sumiInk2" }
"ui.virtual.whitespace" = "sumiInk5"
"ui.virtual.indent-guide" = "sumiInk4"
"ui.virtual.inlay-hint" = { fg = "sumiInk6", modifiers = ["italic"] }
"ui.virtual.inlay-hint.parameter" = { fg = "carpYellow", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "waveAqua2", modifiers = ["italic"] }
"ui.virtual.wrap" = "sumiInk6"
"ui.virtual.jump-label" = { fg = "peachRed", modifiers = ["bold"] }

"ui.menu" = { fg = "fujiWhite", bg = "sumiInk3" }
"ui.menu.selected" = { fg = "sumiInk0", bg = "springViolet2" }
"ui.menu.scroll" = { fg = "oldWhite", bg = "sumiInk5" }

"ui.picker.header" = { fg = "roninYellow", modifiers = ["bold"] }
"ui.picker.header.column" = { fg = "springGreen", modifiers = ["underlined"] }
"ui.picker.header.column.active" = { fg = "peachRed", modifiers = ["bold", "underlined"] }

# Diagnostic Colors
"error" = "samuraiRed"
"warning" = "roninYellow" 
"info" = "crystalBlue"
"hint" = "waveAqua1"

"diagnostic" = { modifiers = ["underlined"] }
"diagnostic.hint" = { fg = "waveAqua1", modifiers = ["underlined"] }
"diagnostic.info" = { fg = "crystalBlue", modifiers = ["underlined"] }
"diagnostic.warning" = { fg = "roninYellow", modifiers = ["underlined"] }
"diagnostic.error" = { fg = "samuraiRed", modifiers = ["underlined"] }
"diagnostic.unnecessary" = { fg = "sumiInk6", modifiers = ["dim"] }
"diagnostic.deprecated" = { fg = "sumiInk6", modifiers = ["crossed_out"] }

# Syntax Highlighting
"type" = "waveAqua2"
"type.builtin" = { fg = "springViolet1", modifiers = ["italic"] }
"type.parameter" = "carpYellow"
"type.enum" = "waveAqua1"
"type.enum.variant" = "springBlue"

"constructor" = "springBlue"
"constructor.builtin" = { fg = "peachRed", modifiers = ["bold"] }

"constant" = "surimiOrange"
"constant.builtin" = "surimiOrange"
"constant.builtin.boolean" = "peachRed"
"constant.character" = "springGreen"
"constant.character.escape" = "roninYellow"
"constant.numeric" = "sakuraPink"
"constant.numeric.integer" = "sakuraPink"
"constant.numeric.float" = "sakuraPink"

"string" = "springGreen"
"string.regexp" = "boatYellow2"
"string.special" = { fg = "springViolet1", modifiers = ["italic"] }
"string.special.path" = "springGreen"
"string.special.url" = { fg = "springBlue", modifiers = ["underlined"] }
"string.special.symbol" = "waveAqua1"

"comment" = { fg = "fujiGray", modifiers = ["italic"] }
"comment.line" = { fg = "fujiGray", modifiers = ["italic"] }
"comment.block" = { fg = "fujiGray", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "waveAqua1", modifiers = ["italic"] }

"variable" = "fujiWhite"
"variable.builtin" = { fg = "oniViolet", modifiers = ["italic"] }
"variable.parameter" = { fg = "carpYellow", modifiers = ["italic"] }
"variable.other" = "fujiWhite"
"variable.other.member" = "springBlue"

"label" = "sakuraPink"

"punctuation" = "springViolet2"
"punctuation.bracket" = "springViolet2"
"punctuation.delimiter" = "springViolet2"
"punctuation.special" = "peachRed"

"keyword" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control.conditional" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control.repeat" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control.import" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control.return" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.control.exception" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.operator" = { fg = "boatYellow2", modifiers = ["bold"] }
"keyword.directive" = { fg = "springViolet1", modifiers = ["bold"] }
"keyword.function" = { fg = "oniViolet2", modifiers = ["italic"] }
"keyword.storage" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.storage.type" = { fg = "oniViolet", modifiers = ["bold"] }
"keyword.storage.modifier" = { fg = "oniViolet", modifiers = ["bold"] }

"operator" = "boatYellow2"

"function" = "crystalBlue"
"function.builtin" = { fg = "peachRed", modifiers = ["bold"] }
"function.method" = "crystalBlue"
"function.macro" = { fg = "roninYellow", modifiers = ["bold"] }
"function.special" = { fg = "peachRed", modifiers = ["bold"] }

"tag" = "springBlue"
"tag.builtin" = { fg = "peachRed", modifiers = ["bold"] }

"namespace" = { fg = "surimiOrange", modifiers = ["italic"] }

"markup" = "oldWhite"
"markup.heading" = { fg = "peachRed", modifiers = ["bold"] }
"markup.heading.marker" = { fg = "fujiGray", modifiers = ["bold"] }
"markup.heading.1" = { fg = "peachRed", modifiers = ["bold"] }
"markup.heading.2" = { fg = "roninYellow", modifiers = ["bold"] }
"markup.heading.3" = { fg = "springGreen", modifiers = ["bold"] }
"markup.heading.4" = { fg = "crystalBlue", modifiers = ["bold"] }
"markup.heading.5" = { fg = "oniViolet", modifiers = ["bold"] }
"markup.heading.6" = { fg = "sakuraPink", modifiers = ["bold"] }
"markup.list" = "crystalBlue"
"markup.list.numbered" = "crystalBlue"
"markup.list.unnumbered" = "crystalBlue"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "springBlue", modifiers = ["underlined"] }
"markup.link.url" = { fg = "springBlue", modifiers = ["underlined"] }
"markup.link.text" = "crystalBlue"
"markup.link.label" = "waveAqua1"
"markup.quote" = { fg = "fujiGray", modifiers = ["italic"] }
"markup.raw" = "springGreen"
"markup.raw.inline" = "springGreen"
"markup.raw.block" = { fg = "springGreen", bg = "sumiInk1" }

"diff" = "fujiGray"
"diff.plus" = "autumnGreen"
"diff.minus" = "autumnRed"
"diff.delta" = "autumnYellow"
"diff.delta.moved" = "waveAqua1"

# Special highlighting for search and matches
"ui.highlight" = { bg = "waveBlue2" }
"ui.highlight.frameline" = { bg = "autumnRed" }

# Git gutter
"diff.plus.gutter" = "autumnGreen"
"diff.minus.gutter" = "autumnRed"
"diff.delta.gutter" = "autumnYellow"

[palette]
# Autumn colors
autumnGreen = "#76946A"
autumnRed = "#C34043"
autumnYellow = "#DCA561"

# Boat colors
boatYellow1 = "#938056"
boatYellow2 = "#C0A36E"

# Crystal and light colors
crystalBlue = "#7E9CD8"
lightBlue = "#A3D4D5"

# Fuji colors
fujiGray = "#727169"
fujiWhite = "#DCD7BA"

# Old colors
oldWhite = "#C8C093"

# Oni colors
oniViolet = "#957FB8"
oniViolet2 = "#b8b4d0"

# Peach and vibrant colors
peachRed = "#FF5D62"
roninYellow = "#FF9E3B"
sakuraPink = "#D27E99"
samuraiRed = "#E82424"

# Spring colors
springBlue = "#7FB4CA"
springGreen = "#98BB6C"
springViolet1 = "#938AA9"
springViolet2 = "#9CABCA"

# Sumi ink (dark colors)
sumiInk0 = "#16161D"
sumiInk1 = "#181820"
sumiInk2 = "#1a1a22"
sumiInk3 = "#1F1F28"
sumiInk4 = "#2A2A37"
sumiInk5 = "#363646"
sumiInk6 = "#54546D"

# Surimi colors
surimiOrange = "#FFA066"

# Wave colors
waveAqua1 = "#6A9589"
waveAqua2 = "#7AA89F"
waveBlue1 = "#223249"
waveBlue2 = "#2D4F67"
waveRed = "#E46876"

# Carp colors
carpYellow = "#E6C384"

# Katana colors
katanaGray = "#717C7C"

# Winter colors (for subtle backgrounds)
winterBlue = "#252535"
winterGreen = "#2B3328"
winterRed = "#43242B"
winterYellow = "#49443C"
