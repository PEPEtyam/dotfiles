
# Syntax highlighting - minimal but informative
"type" = "fg0"                      # Структуры/типы - оранжевый для выделения
"constant" = "pink_const"                  # Константы
"constant.numeric" = "pink_const"          # Числа
"constant.character.escape" = "orange_keyword"    # Escape-последовательности - без выделения
"string" = "green_string"                     # Строки - зеленый (как в Alabaster)
"string.regexp" = "green_string"              # Регулярные выражения - тоже зеленый
"comment" = "green_comment"                   # Комментарии - желтый для заметности
"variable" = "fg0"                     # Переменные - обычный текст
"variable.builtin" = "orange_keyword"             # Встроенные переменные - без выделения
"variable.parameter" = "fg0"           # Параметры - обычный текст
"variable.other.member" = "yellow_entity"        # Поля объектов - обычный текст
"label" = "fg0"                        # Метки - обычный текст
"punctuation" = "grey2"                # Пунктуация - серый
"punctuation.delimiter" = "grey2"      # Разделители
"punctuation.bracket" = "fg0"          # Скобки - обычный текст для читаемости
"keyword" = "orange_keyword"                      # Ключевые слова - легкое выделение серым  
"keyword.directive" = "orange_keyword"            # Директивы  
"operator" = "orange_keyword"                     # Операторы - обычный текст
"function" = "blue_func"                     # Функции/методы - темно-синий
"function.builtin" = "blue_func"             # Встроенные функции - тоже синий
"function.macro" = "blue_func"               # Макросы - синий
"tag" = "orange_keyword"                       # HTML/XML теги - оранжевый
"namespace" = "fg0"                    # Пространства имен - обычный текст
"attribute" = "beige_attr"                    # Атрибуты - обычный текст
"constructor" = "blue_func"               # Конструкторы - оранжевый (как типы)
"module" = "fg0"                       # Модули - обычный текст
"special" = "green_annotation"                      # Специальные элементы - обычный текст

# Markdown - минимальное оформление
"markup.heading.marker" = "grey2"
"markup.heading.1" = { fg = "orange", modifiers = ["bold"] }
"markup.heading.2" = { fg = "orange", modifiers = ["bold"] }
"markup.heading.3" = { fg = "orange", modifiers = ["bold"] }
"markup.heading.4" = { fg = "fg0", modifiers = ["bold"] }
"markup.heading.5" = { fg = "fg0", modifiers = ["bold"] }
"markup.heading.6" = { fg = "fg0", modifiers = ["bold"] }
"markup.list" = "fg0"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.link.url" = { fg = "blue", modifiers = ["underlined"] }
"markup.link.text" = "fg0"
"markup.quote" = "grey2"
"markup.raw" = "green"

# Diff
"diff.plus" = "bg_green"
"diff.delta" = "bg_yellow"
"diff.minus" = "bg_red"

# UI - сохраняем вашу конфигурацию
"ui.background" = {}
"ui.background.separator" = "grey0"
"ui.cursor" = { fg = "bg0", bg = "fg0" }
"ui.cursor.match" = { fg = "orange", bg = "bg_visual_yellow" }
"ui.cursor.insert" = { fg = "bg0", bg = "grey2" }
"ui.cursor.select" = { fg = "bg0", bg = "blue" }
"ui.cursorline.primary" = { bg = "bg1" }
"ui.cursorline.secondary" = { bg = "bg1" }
"ui.selection" = { bg = "bg3" }
"ui.linenr" = "grey0"
"ui.linenr.selected" = { fg = "fg0", modifiers = ["bold"] }
"ui.statusline" = { fg = "fg0", bg = "bg1" }
"ui.statusline.inactive" = { fg = "grey0", bg = "bg0" }
"ui.statusline.normal" = { fg = "bg0", bg = "fg0", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg0", bg = "yellow", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg0", bg = "blue", modifiers = ["bold"] }
"ui.bufferline" = { fg = "grey0", bg = "bg1" }
"ui.bufferline.active" = { fg = "fg0", bg = "bg3", modifiers = ["bold"] }
"ui.popup" = { fg = "grey2" }
"ui.window" = { fg = "grey0" }
"ui.help" = { fg = "fg0" }
"ui.text" = "fg0"
"ui.text.focus" = "fg0"
"ui.menu" = { fg = "fg0" }
"ui.menu.selected" = { fg = "bg0", bg = "fg1", modifiers = ["bold"]  }
"ui.virtual.whitespace" = { fg = "bg4" }
"ui.virtual.indent-guide" = { fg = "bg4" }
"ui.virtual.inlay-hint" = { fg = "grey0", modifiers = ["italic"]}
"ui.virtual.inlay-hint.parameter" = { fg = "grey1" }
"ui.virtual.inlay-hint.type" = { fg = "grey0" }
"ui.virtual.ruler" = { bg = "bg0" }

# Diagnostics
"hint" = "bg_blue"
"info" = "bg_yellow"
"warning" = "bg_orange"
"error" = "bg_red"
"diagnostic" = { underline = { style = "curl" } }
"diagnostic.hint" = { underline = { color = "bg_blue", style = "curl" } }
"diagnostic.info" = { underline = { color = "bg_yellow", style = "curl" } }
"diagnostic.warning" = { underline = { color = "bg_orange", style = "curl" } }
"diagnostic.error" = { underline = { color = "bg_red", style = "curl" } }

